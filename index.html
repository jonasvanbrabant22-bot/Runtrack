<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Runtrack Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RunTrack">
    
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/jonasvanbrabant22-bot/Runtrack/main/Runtrack.png?v=2">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            margin: 0; font-family: -apple-system, system-ui, sans-serif; 
            background: #000; color: white; 
            padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
            -webkit-tap-highlight-color: transparent;
        }
        .container { padding: 20px 25px; max-width: 500px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 18px; margin-top: 10px; }
        
        .card { 
            background: #111; border-radius: 28px; padding: 22px; 
            height: 160px; border: 1px solid #222; overflow: hidden;
            position: relative; display: flex; flex-direction: column;
            text-align: left; width: 100%; color: inherit; appearance: none; -webkit-appearance: none;
            cursor: pointer; touch-action: manipulation;
        }
        .card:active { background: #161616; transform: scale(0.97); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; z-index: 5; width: 100%; }
        
        .badge {
            background: rgba(46, 204, 113, 0.1); color: #2ecc71; padding: 6px 14px;
            border-radius: 100px; font-size: 11px; font-weight: 800; text-transform: uppercase;
            border: 1px solid rgba(46, 204, 113, 0.2); pointer-events: none;
        }
        
        .latest-val { font-size: 28px; font-weight: 900; font-family: tabular-nums; }
        .unit { font-size: 12px; color: #555; margin-left: 4px; }
        .mini-chart-container { position: absolute; bottom: 0; left: 0; right: 0; height: 85px; z-index: 1; pointer-events: none; }
        
        .hidden { display: none !important; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; height: 50px; }
        
        .icon-btn { 
            width: 48px; height: 48px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            background: #111; border: 1px solid #222; cursor: pointer;
        }
        .add-btn { background: #2ecc71; border: none; }

        /* Klikbare titel in de topbar */
        #detail-title { cursor: pointer; }
        #detail-title:active { opacity: 0.6; }

        /* INPUT FIX: iOS datumveld gelijk aan rest */
        input { 
            width: 100%; padding: 18px; margin: 8px 0; border-radius: 16px; 
            border: 1px solid #222; background: #111; color: white; 
            font-size: 17px; box-sizing: border-box; display: block;
            appearance: none; -webkit-appearance: none; min-height: 58px;
        }
        
        .form-row { display: flex; gap: 10px; }
        .btn-block { background: #2ecc71; padding: 20px; text-align: center; border-radius: 18px; margin-top: 25px; font-weight: 800; color: black; cursor: pointer; }
        .btn-delete { color: #ff4757; text-align: center; padding: 15px; font-weight: 700; margin-top: 10px; cursor: pointer; opacity: 0.8; }

        .list-item { 
            background: #111; padding: 20px; border-radius: 24px; margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid #222; gap: 15px;
        }
        .list-left { flex: 1; min-width: 0; }
        .list-right { text-align: right; flex-shrink: 0; }
        .list-date { color: #555; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .list-stats { font-size: 18px; font-weight: 800; white-space: nowrap; }
        .extra-metrics { display: flex; gap: 6px; margin-top: 6px; }
        .m-badge { font-size: 10px; padding: 4px 8px; border-radius: 8px; background: #1a1a1a; color: #888; border: 1px solid #222; font-weight: 600; }
        .bpm-badge { 
            background: rgba(0, 210, 255, 0.1); color: #00d2ff; padding: 6px 12px; 
            border-radius: 12px; font-weight: 900; border: 1px solid rgba(0, 210, 255, 0.2);
            display: inline-block; margin-bottom: 4px; font-family: tabular-nums;
        }
        .ef-sub { color: #2ecc71; font-size: 13px; font-weight: 800; display: block; font-family: tabular-nums; }
    </style>
</head>
<body>

<div id="screen-home" class="container">
    <div class="grid">
        <button class="card" onclick="openDetail('cat1')">
            <div class="card-header">
                <span class="badge" id="name_cat1">Laden...</span>
                <div id="val_cat1" class="latest-val">-- <span class="unit">EF</span></div>
            </div>
            <div class="mini-chart-container"><canvas id="mini_cat1"></canvas></div>
        </button>
        <button class="card" onclick="openDetail('cat2')">
            <div class="card-header">
                <span class="badge" id="name_cat2" style="color:#3498db; border-color:rgba(52,152,219,0.3); background:rgba(52,152,219,0.1);">Laden...</span>
                <div id="val_cat2" class="latest-val">-- <span class="unit">EF</span></div>
            </div>
            <div class="mini-chart-container"><canvas id="mini_cat2"></canvas></div>
        </button>
        <button class="card" onclick="openDetail('cat3')">
            <div class="card-header">
                <span class="badge" id="name_cat3" style="color:#e67e22; border-color:rgba(230,126,34,0.3); background:rgba(230,126,34,0.1);">Laden...</span>
                <div id="val_cat3" class="latest-val">-- <span class="unit">EF</span></div>
            </div>
            <div class="mini-chart-container"><canvas id="mini_cat3"></canvas></div>
        </button>
    </div>
</div>

<div id="screen-detail" class="container hidden">
    <div class="topbar">
        <button class="icon-btn" onclick="showHome()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2ecc71" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div id="detail-title" style="font-weight: 800; font-size: 19px; text-transform: uppercase;" onclick="renameCurrentCategory()"></div>
        <button class="icon-btn add-btn" onclick="showForm()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>
    <div id="run-list"></div>
</div>

<div id="screen-form" class="container hidden">
    <div class="topbar">
        <button class="icon-btn" onclick="cancelForm()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <div style="font-weight:800; font-size: 18px;">Training Invoeren</div>
        <div style="width:48px;"></div>
    </div>
    <input type="hidden" id="edit-index">
    <input type="date" id="input-date">
    <input type="number" id="input-dist" step="0.01" placeholder="Afstand (km)" inputmode="decimal">
    <input type="number" id="input-hr" placeholder="Gem. hartslag" inputmode="numeric">
    <div class="form-row">
        <input type="number" id="input-h" placeholder="Uur" inputmode="numeric">
        <input type="number" id="input-m" placeholder="Min" inputmode="numeric">
        <input type="number" id="input-s" placeholder="Sec" inputmode="numeric">
    </div>
    <div class="btn-block" onclick="saveRun()">Opslaan</div>
    <div id="delete-container" class="hidden" onclick="deleteRun()"><div class="btn-delete">Verwijder training</div></div>
</div>

<script>
let currentCategory = "";
let charts = {};

const defaultNames = { cat1: "Zone 2", cat2: "VO2max", cat3: "Afstand" };

function getCategoryName(id) {
    return localStorage.getItem('name_' + id) || defaultNames[id];
}

// Nieuwe functie om de huidige categorie te hernoemen vanaf scherm 2
function renameCurrentCategory() {
    const oldName = getCategoryName(currentCategory);
    const newName = prompt("Nieuwe naam voor deze training:", oldName);
    if (newName && newName.trim() !== "") {
        localStorage.setItem('name_' + currentCategory, newName.trim());
        document.getElementById('detail-title').innerText = newName.trim();
        updateDashboard(); // Werk ook de namen op de achtergrond bij
    }
}

function getLocalData(cat) {
    let data = JSON.parse(localStorage.getItem('rundata_' + cat)) || [];
    data = data.map(d => {
        if (!d.speed || !d.pace) {
            const totalMin = (parseInt(d.h || 0) * 60) + parseInt(d.m || 0) + (parseInt(d.s || 0) / 60);
            if (totalMin > 0) {
                d.speed = (parseFloat(d.dist) / (totalMin / 60)).toFixed(1);
                const pMin = Math.floor(totalMin / parseFloat(d.dist));
                const pSec = Math.round((totalMin / parseFloat(d.dist) - pMin) * 60);
                d.pace = `${pMin}:${pSec < 10 ? '0' + pSec : pSec}`;
            }
        }
        return d;
    });
    return data.sort((a,b) => new Date(a.date) - new Date(b.date));
}

function saveRun() {
    const dist = parseFloat(document.getElementById('input-dist').value);
    const hr = parseFloat(document.getElementById('input-hr').value);
    const h = parseInt(document.getElementById('input-h').value) || 0;
    const m = parseInt(document.getElementById('input-m').value) || 0;
    const s = parseInt(document.getElementById('input-s').value) || 0;
    if(!dist || !hr || (h+m+s === 0)) return alert("Vul alles volledig in!");
    
    const totalMin = (h * 60) + m + (s / 60);
    const ef = ((dist * 1000) / totalMin) / hr;
    let data = JSON.parse(localStorage.getItem('rundata_' + currentCategory)) || [];
    const entry = {
        date: document.getElementById('input-date').value,
        dist: dist.toFixed(2), hr, h, m, s, ef, displayVal: ef.toFixed(2),
        timeStr: `${h>0?h+'u ':''}${m}m ${s}s`,
        speed: (dist / (totalMin / 60)).toFixed(1),
        pace: `${Math.floor(totalMin/dist)}:${Math.round((totalMin/dist - Math.floor(totalMin/dist))*60).toString().padStart(2,'0')}`
    };
    const idx = document.getElementById('edit-index').value;
    if(idx !== "" && idx > -1) { data[parseInt(idx)] = entry; } else { data.push(entry); }
    localStorage.setItem('rundata_' + currentCategory, JSON.stringify(data));
    openDetail(currentCategory);
}

function renderList() {
    const data = getLocalData(currentCategory);
    document.getElementById('run-list').innerHTML = [...data].reverse().map((d, i) => `
        <div class="list-item" onclick="showForm(${data.length - 1 - i})">
            <div class="list-left">
                <span class="list-date">${new Date(d.date).toLocaleDateString('nl-NL', {day:'numeric', month:'short'})}</span>
                <div class="list-stats">${d.dist} km <span style="font-size:12px; color:#444; font-weight:500;">${d.timeStr}</span></div>
                <div class="extra-metrics">
                    <span class="m-badge">${d.speed || '--'} km/u</span>
                    <span class="m-badge">${d.pace || '--'} min/km</span>
                </div>
            </div>
            <div class="list-right">
                <span class="bpm-badge">${d.hr} BPM</span>
                <span class="ef-sub">${d.displayVal} EF</span>
            </div>
        </div>`).join('');
}

function updateDashboard() {
    ['cat1', 'cat2', 'cat3'].forEach(id => {
        document.getElementById('name_' + id).innerText = getCategoryName(id);
        const data = getLocalData(id);
        const lastVal = data.length > 0 ? data[data.length - 1].displayVal : "--";
        document.getElementById('val_' + id).innerHTML = `${lastVal} <span class="unit">EF</span>`;
        const canvas = document.getElementById('mini_' + id);
        if (!canvas) return;
        if(charts[id]) charts[id].destroy();
        charts[id] = new Chart(canvas.getContext('2d'), {
            type: 'line',
            data: {
                labels: data.map(d => d.date),
                datasets: [{ 
                    data: data.map(d => d.ef), 
                    borderColor: id === 'cat1' ? '#2ecc71' : (id === 'cat2' ? '#3498db' : '#e67e22'), 
                    borderWidth: 3, pointRadius: 0, tension: 0.4, fill: true,
                    backgroundColor: 'rgba(255,255,255,0.02)'
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false, grace: '15%' } } }
        });
    });
}

function showHome() { hideAll(); document.getElementById('screen-home').classList.remove('hidden'); updateDashboard(); }
function openDetail(cat) { 
    currentCategory = cat; 
    hideAll(); 
    document.getElementById('screen-detail').classList.remove('hidden'); 
    document.getElementById('detail-title').innerText = getCategoryName(cat); 
    renderList(); 
}

function showForm(idx = -1) { 
    hideAll(); 
    document.getElementById('screen-form').classList.remove('hidden'); 
    document.getElementById('edit-index').value = idx;
    if(idx > -1) {
        const d = getLocalData(currentCategory)[idx];
        document.getElementById('input-date').value = d.date;
        document.getElementById('input-dist').value = d.dist;
        document.getElementById('input-hr').value = d.hr;
        document.getElementById('input-h').value = d.h;
        document.getElementById('input-m').value = d.m;
        document.getElementById('input-s').value = d.s;
        document.getElementById('delete-container').classList.remove('hidden');
    } else {
        document.getElementById('input-date').valueAsDate = new Date();
        ['input-dist', 'input-hr', 'input-h', 'input-m', 'input-s'].forEach(id => document.getElementById(id).value = "");
        document.getElementById('delete-container').classList.add('hidden');
    }
}

function deleteRun() { if(confirm("Training verwijderen?")) { let data = JSON.parse(localStorage.getItem('rundata_' + currentCategory)) || []; data.splice(document.getElementById('edit-index').value, 1); localStorage.setItem('rundata_' + currentCategory, JSON.stringify(data)); openDetail(currentCategory); } }
function cancelForm() { openDetail(currentCategory); }
function hideAll() { document.querySelectorAll('.container').forEach(c => c.classList.add('hidden')); }

window.onload = showHome;
</script>
</body>
</html>
