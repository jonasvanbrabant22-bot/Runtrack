<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Runtrack Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RunTrack">
    
    <link rel="apple-touch-icon" href="https://weserv.nl/?url=raw.githubusercontent.com/jonasvanbrabant22-bot/Runtrack/main/IMG_0753.PNG&w=500&h=500&fit=cover">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            margin: 0; font-family: -apple-system, sans-serif; background: #000; color: white; 
            padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
            -webkit-tap-highlight-color: transparent;
        }
        .container { padding: 20px 25px; max-width: 500px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 18px; margin-top: 10px; }
        .card { 
            background: #111; border-radius: 28px; padding: 22px; height: 160px; 
            position: relative; border: 1px solid #222; overflow: hidden;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; z-index: 2; position: relative; }
        .badge {
            background: rgba(46, 204, 113, 0.1); color: #2ecc71; padding: 6px 14px;
            border-radius: 100px; font-size: 11px; font-weight: 800; text-transform: uppercase;
            border: 1px solid rgba(46, 204, 113, 0.2);
        }
        .latest-val { font-size: 28px; font-weight: 900; color: #fff; }
        .unit { font-size: 12px; color: #555; margin-left: 4px; }
        .mini-chart-container { position: absolute; bottom: 0; left: 0; right: 0; height: 85px; z-index: 1; pointer-events: none; }
        .hidden { display: none !important; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .icon-btn { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; outline: none; background: #111; }
        .add-btn { background: #2ecc71; color: white; }
        input { width: 100%; padding: 18px; margin: 8px 0; border-radius: 16px; border: 1px solid #222; background: #111; color: white; font-size: 17px; box-sizing: border-box; }
        .btn-block { background: #2ecc71; padding: 20px; text-align: center; border-radius: 18px; margin-top: 25px; font-weight: 800; color: black; cursor: pointer; }
        .list-item { background: #111; padding: 20px; border-radius: 24px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .bpm-badge { background: rgba(0, 210, 255, 0.1); color: #00d2ff; padding: 6px 12px; border-radius: 12px; font-weight: 900; }
        .ef-sub { color: #2ecc71; font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>

<div id="screen-home" class="container">
    <div class="grid">
        <div class="card" onclick="openDetail('zone2')">
            <div class="card-header"><span class="badge">Zone 2</span><div id="val_zone2" class="latest-val">-- <span class="unit">EF</span></div></div>
            <div class="mini-chart-container"><canvas id="mini_zone2"></canvas></div>
        </div>
        <div class="card" onclick="openDetail('vo2max')">
            <div class="card-header"><span class="badge" style="color:#3498db;">VO2max</span><div id="val_vo2max" class="latest-val">-- <span class="unit">EF</span></div></div>
            <div class="mini-chart-container"><canvas id="mini_vo2max"></canvas></div>
        </div>
        <div class="card" onclick="openDetail('afstand')">
            <div class="card-header"><span class="badge" style="color:#e67e22;">Afstand</span><div id="val_afstand" class="latest-val">-- <span class="unit">EF</span></div></div>
            <div class="mini-chart-container"><canvas id="mini_afstand"></canvas></div>
        </div>
    </div>
</div>

<div id="screen-detail" class="container hidden">
    <div class="topbar">
        <button class="icon-btn" onclick="showHome()">⬅️</button>
        <div id="detail-title" style="font-weight: 800; font-size: 19px;"></div>
        <button class="icon-btn add-btn" onclick="showForm()">➕</button>
    </div>
    <div id="run-list"></div>
</div>

<div id="screen-form" class="container hidden">
    <div class="topbar"><button class="icon-btn" onclick="cancelForm()">✖</button></div>
    <input type="date" id="input-date">
    <input type="number" id="input-dist" step="0.01" placeholder="Afstand (km)">
    <input type="number" id="input-hr" placeholder="Gem. hartslag">
    <div style="display:flex; gap:10px;">
        <input type="number" id="input-h" placeholder="Uur">
        <input type="number" id="input-m" placeholder="Min">
        <input type="number" id="input-s" placeholder="Sec">
    </div>
    <div class="btn-block" onclick="saveRun()">Opslaan</div>
</div>

<script>
let currentCategory = "";
let charts = {};

function getLocalData(cat) {
    return JSON.parse(localStorage.getItem('rundata_' + cat)) || [];
}

function saveRun() {
    const d = parseFloat(document.getElementById('input-dist').value);
    const hr = parseFloat(document.getElementById('input-hr').value);
    const h = parseInt(document.getElementById('input-h').value) || 0;
    const m = parseInt(document.getElementById('input-m').value) || 0;
    const s = parseInt(document.getElementById('input-s').value) || 0;
    
    if(!d || !hr) return alert("Vul afstand en hartslag in!");
    
    const min = (h * 60) + m + (s / 60);
    const ef = ((d * 1000) / min) / hr;

    let data = getLocalData(currentCategory);
    data.push({
        date: document.getElementById('input-date').value,
        dist: d.toFixed(2), hr, ef, displayVal: ef.toFixed(2),
        timeStr: `${h}u ${m}m`
    });
    localStorage.setItem('rundata_' + currentCategory, JSON.stringify(data));
    openDetail(currentCategory);
}

function renderList() {
    const data = getLocalData(currentCategory);
    document.getElementById('run-list').innerHTML = data.slice().reverse().map(d => `
        <div class="list-item">
            <div><b>${d.date}</b><br>${d.dist} km</div>
            <div style="text-align:right"><span class="bpm-badge">${d.hr} BPM</span><br><span class="ef-sub">EF: ${d.displayVal}</span></div>
        </div>`).join('');
}
